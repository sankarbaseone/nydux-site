[[redirects]]
  from = "/gcp-benchmark-mtu-cliff"
  to = "/gcp-benchmark-mtu-cliff/index.html"
  status = 200

[[redirects]]
  from = "/mfu-case-study"
  to = "/mfu-case-study/index.html"
  status = 200

[[redirects]]
  from = "/allreduce"
  to = "/allreduce/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"
